# Config 3 — Pipe variants + gradient damage + bullets
# Builds on config2_baseline by enabling gradient damage.
# Near-gap hits cost more, far-from-gap hits cost less — creates a spatial
# incentive for the agent to prefer threading the gap over crashing through.
#
# Expected emergent behavior:
#   - Thread gap when reachable (zero cost)
#   - Crash far from gap when trajectory makes gap unreachable (low cost)
#   - Use bullets to destroy dangerous pipes when health is low
#   - Avoid near-gap hits (highest cost for each pipe type)
#
# Observation builder : Config2ObsBuilder  (12-dim)
# Reward function     : HealthAwareReward  (auto-selected)

# --- screen ---
screen_w: 800
screen_h: 600
fps: 60

# --- physics ---
physics_mode: discrete
gravity: 0.5
flap_strength: -5.0

# --- scrolling ---
scroll_speed: 3.0

# --- pipes ---
pipe_width: 60
pipe_spacing: 280
gap_height: 160
gap_y_min: 80
gap_y_max: 360

# All non-hard pipes use the same 160px gap — same as config2_baseline
gap_height_soft: 160
gap_height_brittle: 160
gap_height_foam: 160

# --- health ---
health_start: 100.0
passive_drain: 0.0

# --- misc ---
bird_x: 150
max_episode_frames: 18000

# --- feature flags ---
enable_pipe_variants: true
enable_gradient_damage: true     # near-gap = max damage, far-from-gap = min damage
pipe_weight_hard: 0.7
pipe_weight_soft: 0.1
pipe_weight_brittle: 0.1
pipe_weight_foam: 0.1
invincibility_duration: 30

enable_bullets: true
bullet_count: 10
enable_wind: false
enable_health_kits: false
