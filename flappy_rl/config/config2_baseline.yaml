# Config 2 Baseline — Pipe variants, flat damage, normal gaps
# Reproduces the conditions of the best-performing run (ppo_config2_healthaware).
# Pipe variants enabled with flat damage and normal 160px gaps for all types.
# This is the clean baseline before introducing gradient damage or tighter gaps.
#
# Observation builder : Config2ObsBuilder  (11-dim)
# Reward function     : HealthAwareReward  (auto-selected)

# --- screen ---
screen_w: 800
screen_h: 600
fps: 60

# --- physics ---
physics_mode: discrete
gravity: 0.5
flap_strength: -5.0

# --- scrolling ---
scroll_speed: 3.0

# --- pipes ---
pipe_width: 60
pipe_spacing: 280
gap_height: 160
gap_y_min: 80
gap_y_max: 360

# All non-hard pipes use the same 160px gap — no tighter gaps
gap_height_soft: 160
gap_height_brittle: 160
gap_height_foam: 160

# --- health ---
health_start: 100.0
passive_drain: 0.0

# --- misc ---
bird_x: 150
max_episode_frames: 18000

# --- feature flags ---
enable_pipe_variants: true
enable_gradient_damage: false    # flat damage — same wherever bird hits pipe
pipe_weight_hard: 0.7
pipe_weight_soft: 0.1
pipe_weight_brittle: 0.1
pipe_weight_foam: 0.1
invincibility_duration: 30

enable_bullets: false
enable_wind: false
enable_health_kits: false
