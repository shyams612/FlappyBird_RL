# Experiment: baseline
# The simplest environment — hard pipes only, no health mechanics.
# Establishes whether PPO/DQN/A2C can learn Flappy Bird at all.
#
# Features: none
# Obs builder: SimpleObsBuilder (8-dim)
# Reward fn  : SurvivalReward

# --- screen ---
screen_w: 800
screen_h: 600
fps: 60

# --- physics ---
physics_mode: discrete
gravity: 0.5
flap_strength: -5.0

# --- scrolling ---
scroll_speed: 3.0

# --- pipes ---
pipe_width: 60
pipe_spacing: 280
gap_height: 160
gap_y_min: 80
gap_y_max: 360
gap_height_soft: 160
gap_height_brittle: 160
gap_height_foam: 160

# --- health ---
health_start: 100.0
passive_drain: 0.0

# --- misc ---
bird_x: 150
max_episode_frames: 18000

# --- features ---
enable_pipe_variants: false
enable_gradient_damage: false
pipe_weight_hard: 1.0
pipe_weight_soft: 0.0
pipe_weight_brittle: 0.0
pipe_weight_foam: 0.0
invincibility_duration: 30

enable_bullets: false
bullet_count: 10
enable_wind: false
enable_health_kits: false
